services:
  - type: web
    name: uiu-alumni-connect
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build:render
    startCommand: npm run start:render
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        value: https://uiu-alumni-connect.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: https://uiu-alumni-connect.onrender.com/api
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
